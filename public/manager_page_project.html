<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Project Dashboard | Game Asset Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e6edf4 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e2b3c, #0f2b3f);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .page-header p {
            color: #4a5b6e;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* Card styling */
        .card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0,0,0,0.02);
            margin-bottom: 2rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .card:hover {
            box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.12);
        }

        .card-header {
            padding: 1.5rem 2rem 0.5rem 2rem;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3a5f, #2c5a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-body {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 2;
            min-width: 200px;
        }

        .input-wrapper label {
            display: block;
            font-weight: 600;
            color: #1f3b4c;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            background: #ffffff;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .btn {
            border: none;
            background: #1e3a5f;
            color: white;
            font-weight: 600;
            padding: 0.9rem 1.8rem;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: linear-gradient(105deg, #1e5a7d, #0f4a6e);
        }

        .btn-primary:hover {
            background: linear-gradient(105deg, #0f4a6e, #0a3e5c);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -10px rgba(30,90,125,0.4);
        }

        .btn-danger {
            background: #ef4444;
            box-shadow: none;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        /* Project grid */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 0.5rem;
        }

        .project-card {
            background: white;
            border-radius: 28px;
            padding: 1.4rem 1.5rem;
            transition: all 0.25s;
            border: 1px solid #eef2f8;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.02);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: #cbdde9;
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.1);
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .project-icon {
            font-size: 2rem;
        }

        .project-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #0c2e42;
            text-decoration: none;
            transition: color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .project-name:hover {
            color: #3b82f6;
            text-decoration: underline;
        }

        .delete-project-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 40px;
            transition: all 0.2s;
            color: #94a3b8;
        }

        .delete-project-btn:hover {
            background: #fee2e2;
            color: #dc2626;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 28px;
            color: #6b7a8f;
            font-weight: 500;
        }

        .status-msg {
            margin-top: 1rem;
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            background: #f1f5f9;
            color: #1e2a3a;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            transition: all 0.2s;
        }

        hr {
            margin: 1rem 0;
            border: none;
            height: 1px;
            background: linear-gradient(to right, #e2e8f0, transparent);
        }

        @media (max-width: 640px) {
            .card-body {
                padding: 1.2rem;
            }
            .project-grid {
                grid-template-columns: 1fr;
            }
            .form-group {
                flex-direction: column;
                align-items: stretch;
            }
            .btn {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>🎮 Project Hub</h1>
        <p>Organize your game assets by project</p>
    </div>

    <!-- Create Project Card -->
    <div class="card">
        <div class="card-header">
            <h2>✨ Create New Project</h2>
        </div>
        <div class="card-body">
            <form id="createFolderForm">
                <div class="form-group">
                    <div class="input-wrapper">
                        <label>📌 Project Name</label>
                        <input type="text" id="folderNameInput" placeholder="e.g., FantasyRPG, SpaceShooter" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary">➕ Create Project</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Projects List Card -->
    <div class="card">
        <div class="card-header">
            <h2>📂 All Projects</h2>
            <span style="font-size: 0.8rem; background: #eef2ff; padding: 4px 12px; border-radius: 40px;">click to manage versions</span>
        </div>
        <div class="card-body">
            <p id="status" class="status-msg"></p>
            <div id="folderList"></div>
        </div>
    </div>
</div>

<script>
    const folderListContainer = document.getElementById('folderList');
    const statusParagraph = document.getElementById('status');
    const createFolderForm = document.getElementById('createFolderForm');
    const folderNameInput = document.getElementById('folderNameInput');

    async function fetchFolders() {
        try {
            const response = await fetch('/folders');
            const result = await response.json();
            if (response.ok) {
                renderFolderList(result.folders);
                statusParagraph.textContent = `✅ ${result.folders.length} project(s) found`;
                statusParagraph.style.background = "#e6f7ec";
            } else {
                statusParagraph.textContent = `❌ Error: ${result.message}`;
                statusParagraph.style.background = "#fee2e2";
            }
        } catch (error) {
            statusParagraph.textContent = `⚠️ Failed to fetch projects: ${error}`;
            statusParagraph.style.background = "#fee2e2";
        }
    }

    function renderFolderList(folders) {
        folderListContainer.innerHTML = '';
        if (!folders.length) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-state';
            emptyDiv.innerHTML = '✨ No projects yet. Create your first project above!';
            folderListContainer.appendChild(emptyDiv);
            return;
        }

        const grid = document.createElement('div');
        grid.className = 'project-grid';
        folders.forEach((folder) => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `
                <div class="project-info">
                    <span class="project-icon">🗂️</span>
                    <a href="/project/${encodeURIComponent(folder)}" class="project-name">${escapeHtml(folder)}</a>
                </div>
                <button class="delete-project-btn" data-folder="${escapeHtml(folder)}" title="Delete project">🗑️</button>
            `;
            const deleteBtn = card.querySelector('.delete-project-btn');
            deleteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteFolder(folder);
            });
            grid.appendChild(card);
        });
        folderListContainer.appendChild(grid);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    createFolderForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const projectName = folderNameInput.value.trim();
        if (!projectName) {
            statusParagraph.textContent = '📛 Please enter a project name!';
            statusParagraph.style.background = "#fff3e0";
            return;
        }

        try {
            const response = await fetch('/create-folder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ projectName })
            });
            const result = await response.json();
            if (response.ok) {
                statusParagraph.textContent = `✅ ${result.message}`;
                statusParagraph.style.background = "#e0f2e9";
                folderNameInput.value = '';
                fetchFolders();
            } else {
                statusParagraph.textContent = `❌ ${result.message}`;
                statusParagraph.style.background = "#fee2e2";
            }
        } catch (error) {
            statusParagraph.textContent = `🔥 Failed to create project: ${error}`;
            statusParagraph.style.background = "#fee2e2";
        }
    });

    async function deleteFolder(folderName) {
        const confirmMsg = `⚠️ Permanently delete project "${folderName}" and all its versions & files?`;
        if (!confirm(confirmMsg)) return;

        try {
            const response = await fetch(`/delete-folder/${encodeURIComponent(folderName)}`, {
                method: 'DELETE',
            });
            const result = await response.json();
            if (response.ok) {
                statusParagraph.textContent = `🗑️ ${result.message}`;
                statusParagraph.style.background = "#e0f2e9";
                fetchFolders();
            } else {
                statusParagraph.textContent = `❌ ${result.message}`;
                statusParagraph.style.background = "#fee2e2";
            }
        } catch (error) {
            statusParagraph.textContent = `⚠️ Delete failed: ${error}`;
            statusParagraph.style.background = "#fee2e2";
        }
    }

    // Initialize on page load
    document.addEventListener('DOMContentLoaded', fetchFolders);
</script>
</body>
</html>
