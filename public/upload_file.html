<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Game Assets · File Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f1f5f9 0%, #e9eff5 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1.5rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* navigation breadcrumbs */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.7rem 1.2rem;
            border-radius: 60px;
            width: fit-content;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .breadcrumb a {
            text-decoration: none;
            color: #1f5e7e;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .breadcrumb a:hover {
            color: #0f3b4f;
            text-decoration: underline;
        }

        .breadcrumb span {
            color: #5b6e8c;
        }

        /* cards */
        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            margin-bottom: 2rem;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .card-header {
            padding: 1.5rem 2rem 0.5rem 2rem;
            border-bottom: 1px solid #eef2f8;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-header h2 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e3a5f, #2c5a7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .card-body {
            padding: 1.8rem 2rem 2rem 2rem;
        }

        /* dropzone */
        .dropzone {
            border: 2px dashed #cbd5e1;
            border-radius: 28px;
            padding: 2rem 1.5rem;
            text-align: center;
            background: #fefefe;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .dropzone.drag-over {
            border-color: #3b82f6;
            background: #f0f9ff;
            transform: scale(0.99);
        }

        .dropzone-icon {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        .dropzone p {
            color: #4b5563;
            font-weight: 500;
        }

        .file-input-label {
            display: inline-block;
            background: #1e5a7d;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .file-input-label:hover {
            background: #0f4a6e;
            transform: translateY(-1px);
        }

        #fileInput {
            display: none;
        }

        /* progress */
        .progress-wrapper {
            margin-top: 1.5rem;
            background: #eef2f6;
            border-radius: 60px;
            height: 12px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            border-radius: 60px;
            transition: width 0.2s ease;
            position: relative;
        }

        .progress-text {
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 6px;
            color: #2c5a7a;
        }

        /* file grid */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }

        .file-card {
            background: white;
            border-radius: 24px;
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #eef2f8;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
        }

        .file-card:hover {
            border-color: #cbdde9;
            transform: translateY(-2px);
            box-shadow: 0 12px 18px -10px rgba(0, 0, 0, 0.1);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .file-icon {
            font-size: 1.8rem;
            width: 36px;
            text-align: center;
        }

        .file-details {
            overflow: hidden;
        }

        .file-name {
            font-weight: 700;
            color: #1e293b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .file-size {
            font-size: 0.7rem;
            color: #6c7a91;
            margin-top: 2px;
        }

        .delete-file-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 40px;
            color: #9ca3af;
            transition: all 0.2s;
        }

        .delete-file-btn:hover {
            background: #fee2e2;
            color: #ef4444;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            background: #f8fafc;
            border-radius: 28px;
            color: #6b7a8f;
            font-weight: 500;
        }

        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.2rem;
            gap: 12px;
        }

        .btn {
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #f1f5f9;
            color: #1f3b4c;
        }

        .btn-danger {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-danger:hover {
            background: #fecaca;
            transform: translateY(-1px);
        }

        .status-msg {
            margin-top: 1.2rem;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
            background: #f1f5f9;
            color: #1e293b;
            font-weight: 500;
            font-size: 0.85rem;
            text-align: center;
        }

        hr {
            margin: 1rem 0;
            border: none;
            height: 1px;
            background: #e2e8f0;
        }

        @media (max-width: 640px) {
            .card-body {
                padding: 1.2rem;
            }

            .file-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- dynamic breadcrumb -->
        <div class="breadcrumb" id="breadcrumbNav">
            <a href="/project">🏠 Projects</a>
            <span>›</span>
            <a id="projectLink" href="#">Loading...</a>
            <span>›</span>
            <span id="versionNameSpan" style="font-weight: 600;">version</span>
        </div>

        <!-- upload card -->
        <div class="card">
            <div class="card-header">
                <h2>📤 Upload Game Assets</h2>
                <span style="background: #eef2ff; padding: 4px 12px; border-radius: 40px; font-size: 0.75rem;">multiple
                    files allowed</span>
            </div>
            <div class="card-body">
                <div id="dropzone" class="dropzone">
                    <div class="dropzone-icon">📦</div>
                    <p>Drag & drop files here or click to browse</p>
                    <label for="fileInput" class="file-input-label">Choose files</label>
                    <input type="file" id="fileInput" name="files" multiple />
                </div>
                <div id="progressWrapper" class="progress-wrapper">
                    <div id="progressBar" class="progress-bar"></div>
                </div>
                <div id="progressText" class="progress-text" style="display: none;">0%</div>
            </div>
        </div>

        <!-- files management card -->
        <div class="card">
            <div class="card-header">
                <h2>📁 Uploaded Files</h2>
                <button id="deleteAllButton" class="btn btn-danger">🗑️ Delete all</button>
            </div>
            <div class="card-body">
                <p id="status" class="status-msg"></p>
                <div id="fileListContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // DOM elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const statusParagraph = document.getElementById('status');
        const fileListContainer = document.getElementById('fileListContainer');
        const deleteAllButton = document.getElementById('deleteAllButton');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');
        const progressTextSpan = document.getElementById('progressText');

        // helpers: get project/version from URL
        function getProjectNameFromURL() {
            const pathSegments = window.location.pathname.split('/').filter(p => p);
            // URL pattern: /upload_file/:project/:version
            // so project is second last, version is last
            if (pathSegments.length >= 2) {
                return pathSegments[pathSegments.length - 2];
            }
            return '';
        }

        function getVersionNameFromURL() {
            const pathSegments = window.location.pathname.split('/').filter(p => p);
            return pathSegments[pathSegments.length - 1] || '';
        }

        // update breadcrumb
        function updateBreadcrumb() {
            const project = getProjectNameFromURL();
            const version = getVersionNameFromURL();
            const projectLink = document.getElementById('projectLink');
            const versionSpan = document.getElementById('versionNameSpan');
            if (project) {
                projectLink.href = `/project/${encodeURIComponent(project)}`;
                projectLink.textContent = project;
            } else {
                projectLink.textContent = 'unknown';
            }
            if (version) {
                versionSpan.textContent = version;
            } else {
                versionSpan.textContent = 'version';
            }
        }

        // human readable file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        // get file icon based on extension
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) return '🖼️';
            if (['mp4', 'webm', 'mov'].includes(ext)) return '🎬';
            if (['mp3', 'wav', 'ogg'].includes(ext)) return '🎵';
            if (['zip', 'rar', '7z', 'tar', 'gz'].includes(ext)) return '🗜️';
            if (['json', 'xml', 'txt', 'md'].includes(ext)) return '📄';
            if (['exe', 'apk', 'app'].includes(ext)) return '⚙️';
            return '📎';
        }

        // render file list as beautiful cards
        function renderFileList(files) {
            fileListContainer.innerHTML = '';
            if (!files || files.length === 0) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'empty-message';
                emptyDiv.innerHTML = '✨ No files uploaded yet. Drag & drop assets above.';
                fileListContainer.appendChild(emptyDiv);
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'file-grid';
            files.forEach((file) => {
                const card = document.createElement('div');
                card.className = 'file-card';
                const icon = getFileIcon(file.filename);
                card.innerHTML = `
                    <div class="file-info">
                        <div class="file-icon">${icon}</div>
                        <div class="file-details">
                            <div class="file-name" title="${escapeHtml(file.filename)}">${escapeHtml(file.filename)}</div>
                            <div class="file-size">${file.size ? file.size : formatFileSize(file.sizeBytes || 0)}</div>
                        </div>
                    </div>
                    <button class="delete-file-btn" data-filename="${escapeHtml(file.filename)}" title="Delete file">🗑️</button>
                `;
                const delBtn = card.querySelector('.delete-file-btn');
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteFile(file.filename);
                });
                grid.appendChild(card);
            });
            fileListContainer.appendChild(grid);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // fetch files from backend
        async function fetchFiles() {
            try {
                const project = getProjectNameFromURL();
                const version = getVersionNameFromURL();
                if (!project || !version) {
                    statusParagraph.textContent = '⚠️ Invalid project or version path.';
                    return;
                }
                const response = await fetch(`/files/${project}/${version}`);
                const result = await response.json();
                if (response.ok) {
                    // ensure file objects have size in readable format
                    const filesWithSize = (result.files || []).map(f => ({
                        ...f,
                        size: f.size ? (typeof f.size === 'string' ? f.size : formatFileSize(f.size)) : formatFileSize(f.sizeBytes || 0),
                        sizeBytes: f.sizeBytes || f.size || 0
                    }));
                    renderFileList(filesWithSize);
                    statusParagraph.textContent = `✅ ${filesWithSize.length} file(s) available`;
                    statusParagraph.style.background = "#e6f7ec";
                } else {
                    statusParagraph.textContent = `❌ Error: ${result.message}`;
                    statusParagraph.style.background = "#fee2e2";
                }
            } catch (error) {
                statusParagraph.textContent = `⚠️ Failed to fetch files: ${error}`;
                statusParagraph.style.background = "#fee2e2";
            }
        }

        // upload with progress (XHR)
        function uploadFilesWithProgress(formData) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                const project = getProjectNameFromURL();
                const version = getVersionNameFromURL();
                xhr.open('POST', `/upload/${project}/${version}`, true);

                // show progress bar
                progressWrapper.style.display = 'block';
                progressTextSpan.style.display = 'block';
                progressBar.style.width = '0%';
                progressTextSpan.textContent = '0%';

                xhr.upload.onprogress = (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        progressBar.style.width = `${percent}%`;
                        progressTextSpan.textContent = `${percent}%`;
                    }
                };

                xhr.onload = () => {
                    progressWrapper.style.display = 'none';
                    progressTextSpan.style.display = 'none';
                    if (xhr.status === 200) {
                        const result = JSON.parse(xhr.responseText);
                        statusParagraph.textContent = '🎉 Files uploaded successfully!';
                        statusParagraph.style.background = "#e0f2e9";
                        fetchFiles(); // refresh list
                        resolve(result);
                    } else {
                        reject(`Upload failed: ${xhr.statusText}`);
                    }
                };

                xhr.onerror = () => {
                    progressWrapper.style.display = 'none';
                    progressTextSpan.style.display = 'none';
                    reject('Network error during upload');
                };

                xhr.send(formData);
            });
        }

        // handle file upload from input or drop
        async function handleFiles(fileList) {
            if (!fileList || fileList.length === 0) {
                statusParagraph.textContent = '📛 Please select at least one file.';
                statusParagraph.style.background = "#fff3e0";
                return;
            }
            const formData = new FormData();
            Array.from(fileList).forEach(file => formData.append('files', file));
            try {
                await uploadFilesWithProgress(formData);
                // clear file input value to allow re-upload same files
                fileInput.value = '';
            } catch (err) {
                statusParagraph.textContent = `❌ Upload error: ${err}`;
                statusParagraph.style.background = "#fee2e2";
            }
        }

        // delete single file WITH CONFIRMATION
        async function deleteFile(filename) {
            // 🔔 Added confirmation dialog
            const confirmDelete = confirm(`⚠️ Are you sure you want to delete "${filename}"? This action cannot be undone.`);
            if (!confirmDelete) return; // user canceled

            try {
                const project = getProjectNameFromURL();
                const version = getVersionNameFromURL();
                const response = await fetch(`/delete/${project}/${version}/${encodeURIComponent(filename)}`, {
                    method: 'DELETE',
                });
                const result = await response.json();
                if (response.ok) {
                    statusParagraph.textContent = `🗑️ ${result.message}`;
                    statusParagraph.style.background = "#e0f2e9";
                    fetchFiles(); // refresh full list
                } else {
                    statusParagraph.textContent = `❌ ${result.message}`;
                    statusParagraph.style.background = "#fee2e2";
                }
            } catch (error) {
                statusParagraph.textContent = `⚠️ Delete failed: ${error}`;
                statusParagraph.style.background = "#fee2e2";
            }
        }

        // delete all files (already had confirmation)
        deleteAllButton.addEventListener('click', async () => {
            const confirmDelete = confirm('⚠️ Are you sure you want to delete ALL files in this version? This action cannot be undone.');
            if (!confirmDelete) return;
            try {
                const project = getProjectNameFromURL();
                const version = getVersionNameFromURL();
                const response = await fetch(`/delete-all/${project}/${version}`, { method: 'DELETE' });
                const result = await response.json();
                if (response.ok) {
                    statusParagraph.textContent = `🧹 ${result.message}`;
                    statusParagraph.style.background = "#e0f2e9";
                    fetchFiles();
                } else {
                    statusParagraph.textContent = `❌ ${result.message}`;
                    statusParagraph.style.background = "#fee2e2";
                }
            } catch (error) {
                statusParagraph.textContent = `⚠️ Delete all failed: ${error}`;
                statusParagraph.style.background = "#fee2e2";
            }
        });

        // drag & drop zone handling
        function setupDragAndDrop() {
            dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropzone.classList.add('drag-over');
            });
            dropzone.addEventListener('dragleave', () => {
                dropzone.classList.remove('drag-over');
            });
            dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropzone.classList.remove('drag-over');
                const files = e.dataTransfer.files;
                if (files.length) {
                    handleFiles(files);
                }
            });
            dropzone.addEventListener('click', (e) => {
                if (e.target === dropzone || e.target.closest('.dropzone') && !e.target.closest('.file-input-label')) {
                    fileInput.click();
                }
            });
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFiles(e.target.files);
                }
            });
        }

        // initial load
        document.addEventListener('DOMContentLoaded', () => {
            updateBreadcrumb();
            setupDragAndDrop();
            fetchFiles();
        });
    </script>
</body>

</html>
